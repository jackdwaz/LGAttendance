<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Employee Attendance App</title>

<style>

body{
font-family:Arial;
background:#f1f3f8;
margin:0;
}

header{
background:#2f80ed;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:16px;
background:#2f80ed;
color:white;
}

button.secondary{
background:#27ae60;
}

button.danger{
background:#eb5757;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

.profile{
display:flex;
align-items:center;
}

.profile img{
width:60px;
height:60px;
border-radius:50%;
margin-right:10px;
}

.hidden{
display:none;
}

nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -3px 8px rgba(0,0,0,0.1);
}

nav button{
width:auto;
padding:8px 15px;
font-size:14px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:5px;
}

.calendar div{
background:#e9edf7;
padding:10px;
text-align:center;
border-radius:6px;
}

</style>
</head>

<body>

<header>Employee Attendance</header>

<div class="container">

<!-- LOGIN -->

<div id="loginPage" class="card">

<h3>Login</h3>

<input id="empId" placeholder="Employee ID">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<!-- PROFILE PAGE -->

<div id="profilePage" class="hidden">

<div class="card profile">

<img id="profilePic" src="https://via.placeholder.com/60">

<div>
<div id="empName">Employee</div>
<div>ID: <span id="empDisplay"></span></div>
</div>

</div>

<div class="card">

<h3>Today's Attendance</h3>

<div id="status">Not Checked In</div>

<button id="checkInBtn" onclick="checkIn()">Check In</button>

<button id="checkOutBtn" class="secondary hidden" onclick="checkOut()">Check Out</button>

<select id="specialDay">
<option value="">Normal Day</option>
<option value="holiday">Holiday</option>
<option value="leave">Leave</option>
<option value="weekoff">Week Off</option>
</select>

</div>


<div class="card">

<h3>Attendance Calendar</h3>

<div class="calendar" id="calendar"></div>

</div>

</div>



<!-- LEAVE PAGE -->

<div id="leavePage" class="hidden">

<div class="card">

<h3>Apply Leave</h3>

<input type="date" id="leaveFrom">

<input type="date" id="leaveTo">

<textarea id="leaveReason" placeholder="Reason for leave"></textarea>

<button onclick="applyLeave()">Submit Leave</button>

</div>

</div>



<!-- SETTINGS -->

<div id="settingsPage" class="hidden">

<div class="card">

<h3>Password Reset</h3>

<input type="password" placeholder="New Password" id="newPass">

<button onclick="requestReset()">Request Reset</button>

<p>Reset must be approved by admin.</p>

</div>

</div>

</div>


<nav class="hidden" id="navBar">

<button onclick="showPage('profile')">Home</button>

<button onclick="showPage('leave')">Leave</button>

<button onclick="showPage('settings')">Settings</button>

</nav>


<script>

let emp="";

function login(){

emp=document.getElementById("empId").value;

document.getElementById("loginPage").style.display="none";
document.getElementById("profilePage").classList.remove("hidden");
document.getElementById("navBar").classList.remove("hidden");

document.getElementById("empDisplay").innerText=emp;

loadCalendar();

}


function showPage(p){

document.getElementById("profilePage").classList.add("hidden");
document.getElementById("leavePage").classList.add("hidden");
document.getElementById("settingsPage").classList.add("hidden");

if(p=="profile")document.getElementById("profilePage").classList.remove("hidden");
if(p=="leave")document.getElementById("leavePage").classList.remove("hidden");
if(p=="settings")document.getElementById("settingsPage").classList.remove("hidden");

}


function checkIn(){

let special=document.getElementById("specialDay").value;

if(special!=""){

alert("Marked as "+special);
return;

}

navigator.geolocation.getCurrentPosition(pos=>{

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{

alert("Check In Recorded");

document.getElementById("status").innerText="Checked In";

document.getElementById("checkInBtn").classList.add("hidden");

document.getElementById("checkOutBtn").classList.remove("hidden");

});

});

}


function checkOut(){

navigator.geolocation.getCurrentPosition(pos=>{

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{

alert("Check Out Recorded");

document.getElementById("status").innerText="Completed";

document.getElementById("checkOutBtn").classList.add("hidden");

});

});

}


function applyLeave(){

alert("Leave request sent");

}


function requestReset(){

alert("Password reset request sent to admin");

}


function loadCalendar(){

let cal=document.getElementById("calendar");

for(let i=1;i<=30;i++){

let d=document.createElement("div");

d.innerText=i;

cal.appendChild(d);

}

}

</script>

</body>
</html>
