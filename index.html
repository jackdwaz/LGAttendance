<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>HR Attendance System</title>

<style>

body{
font-family:Arial;
background:#f2f4f8;
margin:0;
}

header{
background:#2F80ED;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container{
padding:15px;
padding-bottom:90px;
}

.card{
background:white;
border-radius:14px;
padding:15px;
margin-bottom:15px;
box-shadow:0 6px 14px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-3px);
}

.profile{
display:flex;
align-items:center;
}

.profile img{
width:70px;
height:70px;
border-radius:50%;
margin-right:12px;
object-fit:cover;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:10px;
font-size:15px;
background:#2F80ED;
color:white;
}

button.green{
background:#27AE60;
}

button.red{
background:#EB5757;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

nav{
position:fixed;
bottom:0;
background:white;
width:100%;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -3px 10px rgba(0,0,0,0.1);
}

nav button{
background:none;
color:#444;
font-size:14px;
width:auto;
}

.hidden{
display:none;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:6px;
}

.day{
padding:10px;
border-radius:6px;
text-align:center;
font-size:13px;
}

.present{background:#c8f7c5;}
.absent{background:#ffd6d6;}
.leave{background:#ffe7b3;}
.weekoff{background:#dfe6ff;}

.adminTable{
width:100%;
border-collapse:collapse;
}

.adminTable th, .adminTable td{
border:1px solid #ddd;
padding:8px;
font-size:13px;
}

</style>
</head>

<body>

<header>HR Attendance</header>

<div class="container">

<!-- LOGIN -->

<div id="loginCard" class="card">

<h3>Employee Login</h3>

<input id="loginID" placeholder="Employee ID">

<input type="password" id="loginPass" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<!-- PROFILE -->

<div id="profilePage" class="hidden">

<div class="card profile">

<img id="profilePhoto" src="https://via.placeholder.com/70">

<div>
<b id="empName">Employee</b>
<br>
ID: <span id="empID"></span>
</div>

</div>

<div class="card">

<input type="file" onchange="uploadPhoto(event)">

</div>

<div class="card">

<h3>Today's Attendance</h3>

<div id="attendanceStatus">Not Checked In</div>

<button id="checkinBtn" onclick="checkIn()">Check In</button>

<button id="checkoutBtn" class="red hidden" onclick="checkOut()">Check Out</button>

<select id="specialDay">

<option value="">Normal Day</option>
<option value="leave">Leave</option>
<option value="holiday">Holiday</option>
<option value="weekoff">Week Off</option>

</select>

</div>


<div class="card">

<h3>Attendance Calendar</h3>

<div id="calendar" class="calendar"></div>

</div>

</div>


<!-- LEAVE PAGE -->

<div id="leavePage" class="hidden">

<div class="card">

<h3>Apply Leave</h3>

<input type="date" id="leaveFrom">

<input type="date" id="leaveTo">

<textarea id="leaveReason" placeholder="Reason"></textarea>

<button onclick="applyLeave()">Submit</button>

</div>

</div>


<!-- ADMIN PAGE -->

<div id="adminPage" class="hidden">

<div class="card">

<h3>Employee List</h3>

<table class="adminTable">

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Status</th>
</tr>
</thead>

<tbody id="employeeTable"></tbody>

</table>

</div>


<div class="card">

<h3>Attendance Report</h3>

<table class="adminTable">

<thead>
<tr>
<th>Name</th>
<th>Present</th>
<th>Leave</th>
<th>Absent</th>
</tr>
</thead>

<tbody id="reportTable"></tbody>

</table>

</div>

</div>

</div>


<nav id="navBar" class="hidden">

<button onclick="showPage('profile')">Home</button>

<button onclick="showPage('leave')">Leave</button>

<button onclick="showPage('admin')">Admin</button>

</nav>


<script>

const SCRIPT_URL="PASTE_GOOGLE_APPS_SCRIPT_WEBAPP_URL";

let emp="";

function login(){

emp=document.getElementById("loginID").value;

document.getElementById("empID").innerText=emp;

document.getElementById("loginCard").style.display="none";

document.getElementById("profilePage").classList.remove("hidden");

document.getElementById("navBar").classList.remove("hidden");

generateCalendar();

}


function showPage(p){

document.getElementById("profilePage").classList.add("hidden");
document.getElementById("leavePage").classList.add("hidden");
document.getElementById("adminPage").classList.add("hidden");

if(p=="profile")document.getElementById("profilePage").classList.remove("hidden");
if(p=="leave")document.getElementById("leavePage").classList.remove("hidden");
if(p=="admin")document.getElementById("adminPage").classList.remove("hidden");

}


function uploadPhoto(e){

let reader=new FileReader();

reader.onload=function(){

document.getElementById("profilePhoto").src=reader.result;

};

reader.readAsDataURL(e.target.files[0]);

}


function checkIn(){

let special=document.getElementById("specialDay").value;

if(special!=""){
alert("Marked "+special);
return;
}

navigator.geolocation.getCurrentPosition(pos=>{

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{

alert("Check In Recorded");

document.getElementById("attendanceStatus").innerText="Checked In";

document.getElementById("checkinBtn").classList.add("hidden");

document.getElementById("checkoutBtn").classList.remove("hidden");

});

});

}


function checkOut(){

navigator.geolocation.getCurrentPosition(pos=>{

navigator.mediaDevices.getUserMedia({video:true}).then(stream=>{

alert("Check Out Recorded");

document.getElementById("attendanceStatus").innerText="Completed";

document.getElementById("checkoutBtn").classList.add("hidden");

});

});

}


function applyLeave(){

alert("Leave request submitted");

}


function generateCalendar(){

let cal=document.getElementById("calendar");

cal.innerHTML="";

for(let i=1;i<=30;i++){

let d=document.createElement("div");

d.className="day";

if(i%6==0)d.classList.add("leave");
else if(i%5==0)d.classList.add("absent");
else d.classList.add("present");

d.innerText=i;

cal.appendChild(d);

}

}


</script>

</body>
</html>
